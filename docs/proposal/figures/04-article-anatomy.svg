<svg viewBox="0 0 880 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect x="0" y="0" width="880" height="520" fill="#ffffff"/>
  <text x="30" y="40" font-size="20" font-weight="600" fill="#1f2937">記事ファイルの中身（Markdown 1ファイル）</text>

  <!-- file window -->
  <rect x="30" y="66" width="470" height="420" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="30" y="66" width="470" height="32" rx="10" fill="#E2E8F0"/>
  <rect x="30" y="88" width="470" height="10" fill="#E2E8F0"/>
  <circle cx="48" cy="82" r="4.5" fill="#F87171"/>
  <circle cx="64" cy="82" r="4.5" fill="#FBBF24"/>
  <circle cx="80" cy="82" r="4.5" fill="#34D399"/>
  <text x="250" y="86" text-anchor="middle" font-size="12" fill="#475569" font-weight="600">my-first-post.md</text>

  <!-- frontmatter band -->
  <rect x="44" y="112" width="442" height="158" rx="6" fill="#E1F5EE"/>
  <!-- body band -->
  <rect x="44" y="280" width="442" height="192" rx="6" fill="#F1F5F9"/>

  <g font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13">
    <text x="58" y="134" fill="#94A3B8">---</text>
    <text x="58" y="160"><tspan fill="#0F6E56">title:</tspan><tspan fill="#334155"> 記事のタイトル</tspan></text>
    <text x="58" y="186"><tspan fill="#0F6E56">description:</tspan><tspan fill="#334155"> 一覧に出る短い説明</tspan></text>
    <text x="58" y="212"><tspan fill="#0F6E56">pubDate:</tspan><tspan fill="#334155"> 2026-06-17</tspan></text>
    <text x="58" y="238"><tspan fill="#0F6E56">author:</tspan><tspan fill="#334155"> taka</tspan></text>
    <text x="58" y="264" fill="#94A3B8">---</text>

    <text x="58" y="306"><tspan fill="#185FA5">## はじめに</tspan></text>
    <text x="58" y="332" fill="#334155">本文を Markdown で書きます。</text>
    <text x="58" y="372" fill="#94A3B8">```mermaid</text>
    <text x="58" y="398" fill="#334155">  graph LR; A--&gt;B; B--&gt;C;</text>
    <text x="58" y="424" fill="#94A3B8">```</text>
  </g>

  <!-- callouts -->
  <g>
    <rect x="540" y="112" width="310" height="120" rx="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.4"/>
    <text x="558" y="138" font-size="13.5" font-weight="600" fill="#04342C">① 記事の情報（先頭の --- で囲む）</text>
    <text x="558" y="162" font-size="12" fill="#085041">title … タイトル（必須）</text>
    <text x="558" y="182" font-size="12" fill="#085041">description … 一覧用の短い説明（必須）</text>
    <text x="558" y="202" font-size="12" fill="#085041">pubDate … 公開日（必須）</text>
    <text x="558" y="222" font-size="12" fill="#085041">author … 著者id（任意・未指定は編集部）</text>
  </g>
  <path d="M540,170 L490,180" stroke="#0F6E56" stroke-width="1.6" fill="none" marker-end="url(#t)"/>

  <g>
    <rect x="540" y="248" width="310" height="74" rx="9" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.4"/>
    <text x="558" y="274" font-size="13.5" font-weight="600" fill="#042C53">② 本文は Markdown で自由に</text>
    <text x="558" y="298" font-size="12" fill="#0C447C">見出し・箇条書き・リンク・コードなど</text>
    <text x="558" y="316" font-size="12" fill="#0C447C">普通の文章を書く感覚でOK</text>
  </g>
  <path d="M540,294 L490,320" stroke="#185FA5" stroke-width="1.6" fill="none" marker-end="url(#b)"/>

  <g>
    <rect x="540" y="338" width="310" height="84" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
    <text x="558" y="364" font-size="13.5" font-weight="600" fill="#26215C">③ 図も文章で書ける（Mermaid）</text>
    <text x="558" y="388" font-size="12" fill="#3C3489">```mermaid と書いてフロー図などを記述</text>
    <text x="558" y="406" font-size="12" fill="#3C3489">→ 公開時に自動で画像（図）になる</text>
  </g>
  <path d="M540,388 L490,392" stroke="#534AB7" stroke-width="1.6" fill="none" marker-end="url(#p)"/>

  <defs>
    <marker id="t" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#0F6E56"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#185FA5"/></marker>
    <marker id="p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#534AB7"/></marker>
  </defs>
</svg>