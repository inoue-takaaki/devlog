<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect x="0" y="0" width="880" height="500" fill="#ffffff"/>
  <text x="30" y="40" font-size="20" font-weight="600" fill="#1f2937">一般的なWebサイト と 今回の構成 のちがい</text>

  <!-- ===== Left panel: 動的 ===== -->
  <rect x="30" y="64" width="390" height="416" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="1.5"/>
  <text x="225" y="96" text-anchor="middle" font-size="16" font-weight="600" fill="#4A1B0C">一般的なWebサイト（動的）</text>
  <text x="225" y="118" text-anchor="middle" font-size="12" fill="#993C1D">例：WordPress など</text>

  <rect x="120" y="134" width="210" height="46" rx="8" fill="#ffffff" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="225" y="162" text-anchor="middle" font-size="13" fill="#374151">読者のブラウザ</text>
  <path d="M225,180 L225,200" stroke="#993C1D" stroke-width="2" fill="none" marker-end="url(#r)"/>

  <rect x="120" y="202" width="210" height="62" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="1.5"/>
  <text x="225" y="228" text-anchor="middle" font-size="13.5" font-weight="600" fill="#4A1B0C">Webサーバー</text>
  <text x="225" y="250" text-anchor="middle" font-size="12" fill="#712B13">アクセスの度にプログラムが動く</text>
  <path d="M225,264 L225,284" stroke="#993C1D" stroke-width="2" fill="none" marker-end="url(#r)"/>

  <rect x="120" y="286" width="210" height="50" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="1.5"/>
  <text x="225" y="316" text-anchor="middle" font-size="13.5" font-weight="600" fill="#4A1B0C">データベース</text>

  <text x="52" y="376" font-size="12.5" fill="#993C1D">⚠ 動くプログラム＝攻撃の入口になりやすい</text>
  <text x="52" y="402" font-size="12.5" fill="#993C1D">⚠ サーバーの運用・監視・更新が必要</text>
  <text x="52" y="428" font-size="12.5" fill="#993C1D">⚠ アクセス集中やサーバー障害に弱い</text>
  <text x="52" y="454" font-size="12.5" fill="#993C1D">⚠ 管理画面の乗っ取りリスク</text>

  <!-- ===== Right panel: 静的 ===== -->
  <rect x="460" y="64" width="390" height="416" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
  <text x="655" y="96" text-anchor="middle" font-size="16" font-weight="600" fill="#173404">今回の構成（静的サイト）</text>
  <text x="655" y="118" text-anchor="middle" font-size="12" fill="#3B6D11">Astro + S3 + CloudFront</text>

  <rect x="550" y="134" width="210" height="46" rx="8" fill="#ffffff" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="655" y="162" text-anchor="middle" font-size="13" fill="#374151">読者のブラウザ</text>
  <path d="M655,180 L655,200" stroke="#3B6D11" stroke-width="2" fill="none" marker-end="url(#g)"/>

  <rect x="550" y="202" width="210" height="134" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="655" y="232" text-anchor="middle" font-size="13.5" font-weight="600" fill="#173404">配信（S3 + CloudFront）</text>
  <text x="655" y="262" text-anchor="middle" font-size="12" fill="#27500A">完成済みのHTMLを</text>
  <text x="655" y="280" text-anchor="middle" font-size="12" fill="#27500A">置いて配るだけ</text>
  <text x="655" y="312" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3B6D11">動くプログラム・DBなし</text>

  <text x="482" y="376" font-size="12.5" fill="#3B6D11">✓ 攻撃の入口（脆弱性）がほぼ無い</text>
  <text x="482" y="402" font-size="12.5" fill="#3B6D11">✓ サーバー運用・監視がほぼ不要</text>
  <text x="482" y="428" font-size="12.5" fill="#3B6D11">✓ アクセス集中に強く、安定稼働</text>
  <text x="482" y="454" font-size="12.5" fill="#3B6D11">✓ 乗っ取られる管理画面が存在しない</text>

  <defs>
    <marker id="r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#993C1D"/></marker>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#3B6D11"/></marker>
  </defs>
</svg>