<svg viewBox="0 0 880 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect x="0" y="0" width="880" height="620" fill="#ffffff"/>
  <text x="30" y="40" font-size="20" font-weight="600" fill="#1f2937">変更を公開するまでのルール（2つの経路）</text>
  <text x="30" y="64" font-size="12.5" fill="#64748b">⚡＝自動で実行　／　▶＝人がボタンを押して実行</text>

  <!-- shared: PR -->
  <rect x="40" y="80" width="800" height="46" rx="9" fill="#EEF2F7" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="440" y="108" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">① ブランチで変更し、PR（プルリクエスト）を作る</text>

  <!-- lane headers -->
  <text x="235" y="156" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">記事・サイトの変更</text>
  <text x="645" y="156" text-anchor="middle" font-size="15" font-weight="600" fill="#26215C">インフラの変更</text>
  <line x1="440" y1="142" x2="440" y2="556" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- step: checks (auto) -->
  <rect x="55" y="172" width="360" height="70" rx="9" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="235" y="200" text-anchor="middle" font-size="13.5" font-weight="600" fill="#04342C">⚡ ビルドチェック（自動）</text>
  <text x="235" y="223" text-anchor="middle" font-size="12" fill="#085041">サイトが正しく作れるか自動で確認</text>

  <rect x="465" y="172" width="360" height="70" rx="9" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="645" y="195" text-anchor="middle" font-size="13.5" font-weight="600" fill="#26215C">⚡ 変更プレビュー / plan（自動）</text>
  <text x="645" y="216" text-anchor="middle" font-size="12" fill="#3C3489">「何が・どう変わるか」を一覧表示</text>
  <text x="645" y="233" text-anchor="middle" font-size="11.5" fill="#6D28D9">※ infra を触ったPRだけ実行</text>

  <path d="M235,242 L235,266" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M645,242 L645,266" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- shared: review & merge -->
  <rect x="40" y="268" width="800" height="46" rx="9" fill="#EEF2F7" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="440" y="296" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">② レビューで承認 → main にマージ</text>

  <path d="M235,314 L235,344" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M645,314 L645,344" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- step: deploy -->
  <rect x="55" y="346" width="360" height="78" rx="9" fill="#C0E8D8" stroke="#0F6E56" stroke-width="1.8"/>
  <text x="235" y="376" text-anchor="middle" font-size="14" font-weight="600" fill="#04342C">⚡ 本番へ自動公開</text>
  <text x="235" y="400" text-anchor="middle" font-size="12" fill="#085041">ビルド → S3へ配置 → CDN更新</text>

  <rect x="465" y="346" width="360" height="78" rx="9" fill="#FAEEDA" stroke="#B45309" stroke-width="1.8"/>
  <text x="645" y="376" text-anchor="middle" font-size="14" font-weight="600" fill="#7C2D12">▶ 担当者がボタンを押して apply</text>
  <text x="645" y="400" text-anchor="middle" font-size="12" fill="#92400E">内容を確認した上で、手動で実行</text>

  <path d="M235,424 L235,448" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <path d="M645,424 L645,448" stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#a)"/>

  <!-- targets -->
  <rect x="55" y="450" width="360" height="48" rx="9" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="235" y="479" text-anchor="middle" font-size="13" fill="#334155">サイトに記事が反映される</text>

  <rect x="465" y="450" width="360" height="48" rx="9" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="645" y="479" text-anchor="middle" font-size="13" fill="#334155">AWSの構成が更新される</text>

  <!-- bottom note -->
  <rect x="40" y="524" width="800" height="64" rx="9" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.3"/>
  <text x="60" y="550" font-size="12.5" font-weight="600" fill="#475569">ポイント</text>
  <text x="60" y="572" font-size="12.5" fill="#64748b">記事は「マージ＝自動公開」。インフラ変更だけは、事故防止のため最後に人が確認してボタンを押す二段構え。</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#9ca3af"/></marker>
  </defs>
</svg>