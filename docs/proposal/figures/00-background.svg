<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect x="0" y="0" width="880" height="470" fill="#ffffff"/>
  <text x="30" y="40" font-size="20" font-weight="600" fill="#1f2937">なぜ技術ブログをやるのか</text>

  <!-- 課題 -->
  <g>
    <rect x="30" y="74" width="232" height="332" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
    <text x="146" y="108" text-anchor="middle" font-size="16" font-weight="600" fill="#4A1B0C">現状の課題</text>
    <line x1="52" y1="124" x2="240" y2="124" stroke="#F0997B" stroke-width="1"/>
    <text x="52" y="160" font-size="13" fill="#712B13">・質向上や分野外の学習に</text>
    <text x="52" y="180" font-size="13" fill="#712B13">　取り組んでいるのに…</text>
    <text x="52" y="222" font-size="13" fill="#712B13">・披露する場がない</text>
    <text x="52" y="264" font-size="13" fill="#712B13">・知見が個人で止まり、</text>
    <text x="52" y="284" font-size="13" fill="#712B13">　社内に共有されない</text>
    <text x="52" y="326" font-size="13" fill="#712B13">・社外に会社の技術力が</text>
    <text x="52" y="346" font-size="13" fill="#712B13">　伝わっていない</text>
  </g>

  <!-- center: blog -->
  <g>
    <rect x="324" y="186" width="172" height="108" rx="12" fill="#E1F5EE" stroke="#00877a" stroke-width="2"/>
    <text x="410" y="232" text-anchor="middle" font-size="16" font-weight="600" fill="#04342C">技術ブログ</text>
    <text x="410" y="256" text-anchor="middle" font-size="13" fill="#085041">を開設する</text>
  </g>

  <!-- arrow 課題 -> blog -->
  <path d="M266,240 L320,240" stroke="#9ca3af" stroke-width="2.5" fill="none" marker-end="url(#a)"/>

  <!-- right: 3 aims -->
  <g>
    <rect x="558" y="74" width="292" height="92" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
    <text x="578" y="106" font-size="15" font-weight="600" fill="#173404">① 社内へ：ナレッジ共有</text>
    <text x="578" y="132" font-size="12.5" fill="#27500A">学びを共有し、技術文化を育てる</text>
    <text x="578" y="151" font-size="12.5" fill="#27500A">個人の努力をチームの資産に</text>
  </g>
  <g>
    <rect x="558" y="186" width="292" height="92" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <text x="578" y="218" font-size="15" font-weight="600" fill="#042C53">② 社外へ：技術力の発信</text>
    <text x="578" y="244" font-size="12.5" fill="#0C447C">取り組みを世の中に披露する</text>
    <text x="578" y="263" font-size="12.5" fill="#0C447C">会社の「中身」が見える</text>
  </g>
  <g>
    <rect x="558" y="298" width="292" height="92" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <text x="578" y="330" font-size="15" font-weight="600" fill="#26215C">③ 採用・ブランディング</text>
    <text x="578" y="356" font-size="12.5" fill="#3C3489">社外からの印象が良くなる</text>
    <text x="578" y="375" font-size="12.5" fill="#3C3489">採用活動の追い風に</text>
  </g>

  <!-- arrows blog -> aims -->
  <g stroke="#9ca3af" stroke-width="2.5" fill="none">
    <path d="M500,222 C530,222 528,120 554,120" marker-end="url(#a)"/>
    <path d="M500,240 L554,232" marker-end="url(#a)"/>
    <path d="M500,258 C530,258 528,344 554,344" marker-end="url(#a)"/>
  </g>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#9ca3af"/></marker>
  </defs>
</svg>