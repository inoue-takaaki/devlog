<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect x="0" y="0" width="880" height="470" fill="#ffffff"/>
  <text x="30" y="40" font-size="20" font-weight="600" fill="#1f2937">安全性・運用の安心材料</text>

  <!-- card 1 -->
  <rect x="30" y="68" width="262" height="172" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="1.4"/>
  <text x="50" y="100" font-size="15" font-weight="600" fill="#173404">🛡 攻撃の入口が少ない</text>
  <text x="50" y="130" font-size="12.5" fill="#27500A">動くプログラム・DB・管理画面</text>
  <text x="50" y="149" font-size="12.5" fill="#27500A">が無いため、狙われる脆弱性が</text>
  <text x="50" y="168" font-size="12.5" fill="#27500A">ほとんど存在しない（静的サイト）</text>

  <!-- card 2 -->
  <rect x="309" y="68" width="262" height="172" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.4"/>
  <text x="329" y="100" font-size="15" font-weight="600" fill="#042C53">🔒 通信は暗号化</text>
  <text x="329" y="130" font-size="12.5" fill="#0C447C">すべてHTTPSで暗号化して配信</text>
  <text x="329" y="149" font-size="12.5" fill="#0C447C">（ACM証明書）。盗み見や改ざん</text>
  <text x="329" y="168" font-size="12.5" fill="#0C447C">を防ぐ</text>

  <!-- card 3 -->
  <rect x="588" y="68" width="262" height="172" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.4"/>
  <text x="608" y="100" font-size="15" font-weight="600" fill="#04342C">📦 原本は非公開</text>
  <text x="608" y="130" font-size="12.5" fill="#085041">サイトの原本（S3）は直接公開</text>
  <text x="608" y="149" font-size="12.5" fill="#085041">されず、CloudFront経由でのみ</text>
  <text x="608" y="168" font-size="12.5" fill="#085041">読み取れる</text>

  <!-- card 4 -->
  <rect x="30" y="256" width="262" height="172" rx="10" fill="#EEF2F7" stroke="#64748B" stroke-width="1.4"/>
  <text x="50" y="288" font-size="15" font-weight="600" fill="#334155">📝 変更は履歴に残る</text>
  <text x="50" y="318" font-size="12.5" fill="#475569">すべてPR経由。「誰が・いつ・</text>
  <text x="50" y="337" font-size="12.5" fill="#475569">何を・なぜ」変えたかが記録され、</text>
  <text x="50" y="356" font-size="12.5" fill="#475569">レビューも入る</text>

  <!-- card 5 -->
  <rect x="309" y="256" width="262" height="172" rx="10" fill="#FAEEDA" stroke="#B45309" stroke-width="1.4"/>
  <text x="329" y="288" font-size="15" font-weight="600" fill="#7C2D12">↩ すぐ元に戻せる</text>
  <text x="329" y="318" font-size="12.5" fill="#92400E">問題があっても、過去の状態へ</text>
  <text x="329" y="337" font-size="12.5" fill="#92400E">簡単に戻せる。記事も設定も</text>
  <text x="329" y="356" font-size="12.5" fill="#92400E">同じ仕組みで管理</text>

  <!-- card 6 -->
  <rect x="588" y="256" width="262" height="172" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text x="608" y="288" font-size="15" font-weight="600" fill="#26215C">🧩 影響範囲を分離</text>
  <text x="608" y="318" font-size="12.5" fill="#3C3489">ブログのインフラは独立した</text>
  <text x="608" y="337" font-size="12.5" fill="#3C3489">管理単位。他システムを誤って</text>
  <text x="608" y="356" font-size="12.5" fill="#3C3489">変更・削除する事故が起きない</text>
</svg>