<svg viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect x="0" y="0" width="880" height="440" fill="#ffffff"/>

  <text x="30" y="42" font-size="20" font-weight="600" fill="#1f2937">記事が読者に届くまでと、それを支える仕組み</text>

  <!-- ===== Row 1: content journey ===== -->
  <!-- Markdown -->
  <g>
    <rect x="30" y="78" width="170" height="92" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <text x="115" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">① 原稿を書く</text>
    <text x="115" y="135" text-anchor="middle" font-size="12.5" fill="#085041">Markdown</text>
    <text x="115" y="154" text-anchor="middle" font-size="12.5" fill="#085041">（ただのテキスト）</text>
  </g>
  <!-- Astro -->
  <g>
    <rect x="246" y="78" width="170" height="92" rx="10" fill="#E1F5EE" stroke="#00877a" stroke-width="1.5"/>
    <text x="331" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">② サイトに変換</text>
    <text x="331" y="135" text-anchor="middle" font-size="12.5" fill="#085041">Astro</text>
    <text x="331" y="154" text-anchor="middle" font-size="12.5" fill="#085041">図・著者も自動生成</text>
  </g>
  <!-- AWS -->
  <g>
    <rect x="462" y="78" width="170" height="92" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <text x="547" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">③ 配信する</text>
    <text x="547" y="135" text-anchor="middle" font-size="12.5" fill="#0C447C">AWS S3 + CloudFront</text>
    <text x="547" y="154" text-anchor="middle" font-size="12.5" fill="#0C447C">高速・HTTPS</text>
  </g>
  <!-- Reader -->
  <g>
    <rect x="678" y="78" width="170" height="92" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
    <text x="763" y="112" text-anchor="middle" font-size="15" font-weight="600" fill="#2C2C2A">④ 読者が読む</text>
    <text x="763" y="135" text-anchor="middle" font-size="12.5" fill="#444441">ブラウザで閲覧</text>
    <text x="763" y="154" text-anchor="middle" font-size="12.5" fill="#444441">PC・スマホ</text>
  </g>

  <!-- arrows row1 -->
  <g stroke="#9ca3af" stroke-width="2" fill="none">
    <path d="M204,124 L242,124" marker-end="url(#ar)"/>
    <path d="M420,124 L458,124" marker-end="url(#ar)"/>
    <path d="M636,124 L674,124" marker-end="url(#ar)"/>
  </g>

  <!-- ===== Row 2: foundation ===== -->
  <rect x="30" y="226" width="818" height="178" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="50" y="256" font-size="14" font-weight="600" fill="#475569">この流れを裏で支える仕組み</text>

  <!-- Bitbucket -->
  <g>
    <rect x="50" y="272" width="380" height="112" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
    <text x="240" y="306" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">Bitbucket Pipelines（自動化）</text>
    <text x="240" y="333" text-anchor="middle" font-size="12.5" fill="#0C447C">「原稿をマージ → 自動で公開」までを実行</text>
    <text x="240" y="354" text-anchor="middle" font-size="12.5" fill="#0C447C">手作業のアップロードや公開ミスを防ぐ</text>
  </g>
  <!-- Terraform -->
  <g>
    <rect x="448" y="272" width="380" height="112" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <text x="638" y="306" text-anchor="middle" font-size="15" font-weight="600" fill="#26215C">Terraform（インフラ管理）</text>
    <text x="638" y="333" text-anchor="middle" font-size="12.5" fill="#3C3489">AWSの構成を「コード」で管理する</text>
    <text x="638" y="354" text-anchor="middle" font-size="12.5" fill="#3C3489">誰でも内容を確認・再現でき、変更も安全</text>
  </g>

  <!-- dashed up arrows from foundation to journey -->
  <g stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 4" fill="none">
    <path d="M240,272 L240,172" marker-end="url(#ar2)"/>
    <path d="M547,272 L547,172" marker-end="url(#ar2)"/>
  </g>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#9ca3af"/></marker>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#9ca3af"/></marker>
  </defs>
</svg>