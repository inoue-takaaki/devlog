<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect x="0" y="0" width="880" height="470" fill="#ffffff"/>
  <text x="30" y="40" font-size="20" font-weight="600" fill="#1f2937">今後の進め方（ロードマップ）</text>

  <!-- timeline base -->
  <line x1="70" y1="96" x2="810" y2="96" stroke="#CBD5E1" stroke-width="2.5"/>
  <circle cx="155" cy="96" r="9" fill="#0F6E56"/>
  <circle cx="440" cy="96" r="9" fill="#185FA5"/>
  <circle cx="725" cy="96" r="9" fill="#534AB7"/>

  <!-- phase 1 -->
  <text x="155" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#0F6E56">フェーズ1</text>
  <rect x="40" y="120" width="232" height="158" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.4"/>
  <text x="156" y="150" text-anchor="middle" font-size="15" font-weight="600" fill="#04342C">立ち上げ</text>
  <text x="60" y="182" font-size="12.5" fill="#085041">・ドメイン取得</text>
  <text x="60" y="206" font-size="12.5" fill="#085041">・AWS構成をTerraformで構築</text>
  <text x="60" y="230" font-size="12.5" fill="#085041">・Bitbucket連携・自動公開設定</text>
  <text x="60" y="254" font-size="12.5" fill="#085041">・最初の記事を公開</text>

  <!-- phase 2 -->
  <text x="440" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#185FA5">フェーズ2</text>
  <rect x="324" y="120" width="232" height="158" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.4"/>
  <text x="440" y="150" text-anchor="middle" font-size="15" font-weight="600" fill="#042C53">運用を回す</text>
  <text x="344" y="182" font-size="12.5" fill="#0C447C">・執筆ルールを社内に周知</text>
  <text x="344" y="206" font-size="12.5" fill="#0C447C">・定期的に記事を投稿</text>
  <text x="344" y="230" font-size="12.5" fill="#0C447C">・書き手（著者）を増やす</text>
  <text x="344" y="254" font-size="12.5" fill="#0C447C">・レビュー運用を定着</text>

  <!-- phase 3 -->
  <text x="725" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#534AB7">フェーズ3</text>
  <rect x="608" y="120" width="232" height="158" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.4"/>
  <text x="724" y="150" text-anchor="middle" font-size="15" font-weight="600" fill="#26215C">広げる</text>
  <text x="628" y="182" font-size="12.5" fill="#3C3489">・社外への発信を強化</text>
  <text x="628" y="206" font-size="12.5" fill="#3C3489">・アクセス分析で改善</text>
  <text x="628" y="230" font-size="12.5" fill="#3C3489">・採用ページ等と連携</text>
  <text x="628" y="254" font-size="12.5" fill="#3C3489">・他チームへ横展開</text>

  <!-- decide box -->
  <rect x="40" y="306" width="800" height="132" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.4"/>
  <text x="60" y="336" font-size="15" font-weight="600" fill="#7C2D12">まず決めたいこと（次のアクション）</text>
  <text x="60" y="368" font-size="13" fill="#9A3412">① 公開ドメイン名（例：blog.gaxi.jp）</text>
  <text x="460" y="368" font-size="13" fill="#9A3412">② 専用リポジトリの作成（Bitbucket）</text>
  <text x="60" y="398" font-size="13" fill="#9A3412">③ 初期の書き手と、インフラ/レビュー担当</text>
  <text x="460" y="398" font-size="13" fill="#9A3412">④ Terraform用のstate保管バケットの用意</text>
  <text x="60" y="424" font-size="12.5" fill="#C2410C">→ これらが決まれば、フェーズ1に着手できます。</text>
</svg>