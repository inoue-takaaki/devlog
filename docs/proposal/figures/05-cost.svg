<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect x="0" y="0" width="880" height="470" fill="#ffffff"/>
  <text x="30" y="40" font-size="20" font-weight="600" fill="#1f2937">費用の目安（小規模なうちは、ごくわずか）</text>

  <!-- header row -->
  <rect x="30" y="64" width="820" height="40" rx="8" fill="#EEF2F7"/>
  <text x="52" y="90" font-size="13" font-weight="600" fill="#475569">サービス</text>
  <text x="330" y="90" font-size="13" font-weight="600" fill="#475569">役割</text>
  <text x="690" y="90" font-size="13" font-weight="600" fill="#475569">月額の目安</text>

  <!-- rows -->
  <g font-size="13.5">
    <text x="52" y="138" fill="#1f2937" font-weight="600">S3</text>
    <text x="330" y="138" fill="#475569">サイトの保管（数MB程度）</text>
    <text x="690" y="138" fill="#0F6E56" font-weight="600">ほぼ ¥0（〜数円）</text>
    <line x1="30" y1="154" x2="850" y2="154" stroke="#E2E8F0"/>

    <text x="52" y="184" fill="#1f2937" font-weight="600">CloudFront</text>
    <text x="330" y="184" fill="#475569">配信（無料枠に収まりやすい）</text>
    <text x="690" y="184" fill="#0F6E56" font-weight="600">ほぼ ¥0</text>
    <line x1="30" y1="200" x2="850" y2="200" stroke="#E2E8F0"/>

    <text x="52" y="230" fill="#1f2937" font-weight="600">Route 53</text>
    <text x="330" y="230" fill="#475569">ドメイン / DNS（固定費）</text>
    <text x="690" y="230" fill="#334155" font-weight="600">約 ¥75〜</text>
    <line x1="30" y1="246" x2="850" y2="246" stroke="#E2E8F0"/>

    <text x="52" y="276" fill="#1f2937" font-weight="600">ACM</text>
    <text x="330" y="276" fill="#475569">HTTPS証明書</text>
    <text x="690" y="276" fill="#0F6E56" font-weight="600">無料</text>
    <line x1="30" y1="292" x2="850" y2="292" stroke="#E2E8F0"/>

    <text x="52" y="322" fill="#1f2937" font-weight="600">Bitbucket</text>
    <text x="330" y="322" fill="#475569">リポジトリ / 自動化（既存利用）</text>
    <text x="690" y="322" fill="#0F6E56" font-weight="600">追加なし</text>
  </g>

  <!-- total band -->
  <rect x="30" y="346" width="820" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="52" y="380" font-size="15" font-weight="600" fill="#04342C">合計の目安</text>
  <text x="690" y="380" font-size="16" font-weight="600" fill="#04342C">月額 おおよそ 数百円程度</text>

  <!-- note -->
  <text x="30" y="432" font-size="12" fill="#64748b">※ ドメイン名の取得費（年額・名前により異なる）は別途。アクセスが大きく増えた場合はCloudFrontが従量課金になります。</text>
  <text x="30" y="452" font-size="12" fill="#64748b">※ 常時起動のサーバーが無いため、「使っていない時間帯のサーバー代」が発生しないのが大きな特徴です。</text>
</svg>